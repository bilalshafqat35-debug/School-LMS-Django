<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">🏫 School LMS</span>
    <a href="{% url 'accounts:profile' %}" class="btn btn-outline-light btn-sm">← Profile</a>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-dark text-white">
                    <h5>🔒 Change Password</h5>
                </div>
                <div class="card-body">

                    {% if messages %}
                        {% for msg in messages %}
                            <div class="alert alert-{{ msg.tags }} alert-dismissible fade show">
                                {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST" action="{% url 'accounts:change_password' %}">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Current Password</label>
                            <input type="password" name="current_password"
                                   class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">New Password</label>
                            <input type="password" name="new_password"
                                   class="form-control" required minlength="8" id="newPass">
                            <div class="form-text">Kam se kam 8 characters.</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Confirm New Password</label>
                            <input type="password" name="confirm_password"
                                   class="form-control" required id="confirmPass">
                            <div id="matchMsg" class="form-text"></div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-dark">🔒 Change Password</button>
                            <a href="{% url 'accounts:profile' %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const newPass = document.getElementById('newPass');
    const confirmPass = document.getElementById('confirmPass');
    const matchMsg = document.getElementById('matchMsg');

    confirmPass.addEventListener('input', function() {
        if (this.value === newPass.value) {
            matchMsg.textContent = '✅ Passwords match!';
            matchMsg.className = 'form-text text-success';
        } else {
            matchMsg.textContent = '❌ Passwords match nahi kar rahe!';
            matchMsg.className = 'form-text text-danger';
        }
    });
</script>
</body>
</html>
