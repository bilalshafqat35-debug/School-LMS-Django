<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School LMS - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #87CEEB, #4A90E2, #1E90FF);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            position: relative;
        }

        .bg-gradient {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #87CEEB, #4A90E2, #1E90FF);
            z-index: 0;
        }

        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            animation: pulse 4s ease-in-out infinite;
            z-index: 0;
        }
        .blob-1 { width: 500px; height: 500px; background: #87CEEB; opacity: 0.18; top: -10%; left: -10%; }
        .blob-2 { width: 400px; height: 400px; background: #4A90E2; opacity: 0.18; bottom: -10%; right: -5%; animation-delay: 1s; }
        .blob-3 { width: 300px; height: 300px; background: #1E90FF; opacity: 0.10; top: 40%; left: 60%; animation-delay: 2s; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .particle {
            position: fixed;
            border-radius: 50%;
            background: rgba(255,255,255,0.07);
            animation: float linear infinite;
            z-index: 0;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
        }

        .card-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            margin: 0 16px;
        }

        .card-glow {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #4A90E2, #1E90FF);
            border-radius: 24px;
            filter: blur(24px);
            opacity: 0.3;
            transform: scale(1.05);
            z-index: -1;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 24px;
            padding: 36px 32px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.10);
        }

        .header { text-align: center; margin-bottom: 32px; }

        .logo-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px; height: 80px;
            border-radius: 20px;
            background: linear-gradient(135deg, #4A90E2, #1E90FF);
            box-shadow: 0 10px 30px rgba(74,144,226,0.4);
            margin-bottom: 16px;
            font-size: 36px;
        }

        .header h1 { font-size: 28px; font-weight: 700; color: #fff; letter-spacing: -0.5px; margin-bottom: 6px; }
        .header p { font-size: 13px; color: rgba(255,255,255,0.45); }

        /* ✅ Fixed - sab message types */
        .messages { margin-bottom: 20px; }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 500;
        }

        .message.error,
        .message.danger {  /* ✅ danger class add ki */
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .message.success {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .message.warning {
            background: rgba(234, 179, 8, 0.2);
            color: #fde047;
            border: 1px solid rgba(234, 179, 8, 0.3);
        }

        .message.info {
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .form-group { margin-bottom: 20px; }

        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255,255,255,0.55);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            margin-left: 4px;
        }

        .input-wrapper { position: relative; }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.35);
            pointer-events: none;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border-radius: 12px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.10);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-control::placeholder { color: rgba(255,255,255,0.22); }

        .form-control:focus {
            border-color: rgba(74,144,226,0.6);
            box-shadow: 0 0 0 3px rgba(74,144,226,0.15), inset 0 2px 4px rgba(0,0,0,0.2);
            background: rgba(255,255,255,0.09);
        }

        .input-wrapper:focus-within .input-icon { color: #60a5fa; }

        .password-wrapper .form-control { padding-right: 48px; }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: rgba(255,255,255,0.35);
            display: flex;
            align-items: center;
            transition: color 0.2s;
            padding: 0;
        }

        .toggle-password:hover { color: rgba(255,255,255,0.65); }

        .btn-login {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #4A90E2 0%, #1E90FF 100%);
            box-shadow: 0 8px 24px rgba(74,144,226,0.4), 0 2px 8px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            margin-top: 20px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(74,144,226,0.5), 0 4px 12px rgba(0,0,0,0.3);
        }

        .btn-login:active { transform: translateY(0); }

        .card-footer {
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.28);
            margin-top: 24px;
        }

        .card-footer a { color: #60a5fa; text-decoration: none; font-weight: 500; }
        .card-footer a:hover { color: #93c5fd; }

        .ssl-badge {
            text-align: center;
            font-size: 11px;
            color: rgba(255,255,255,0.18);
            margin-top: 16px;
        }
    </style>
</head>
<body>

<div class="bg-gradient"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="card-wrapper">
    <div class="card-glow"></div>
    <div class="card">

        <div class="header">
            <div class="logo-box">🏫</div>
            <h1>School LMS</h1>
            <p>Sign in to your learning portal</p>
        </div>

        <!-- ✅ Fixed - sab message tags handle hote hain -->
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="message {{ message.tags }}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" action="{% url 'accounts:login' %}">  <!-- ✅ action add kiya -->
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label">Username</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/>
                        </svg>
                    </span>
                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        placeholder="Enter your username"
                        value="{{ request.POST.username }}"
                        required
                        autocomplete="username"
                    >  <!-- ✅ value preserve - error ke baad username rehta hai -->
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrapper password-wrapper">
                    <span class="input-icon">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </span>
                    <input
                        type="password"
                        name="password"
                        id="passwordInput"
                        class="form-control"
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                    <button type="button" class="toggle-password" onclick="togglePassword()" id="toggleBtn">
                        <svg id="eyeIcon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-login">
                Sign In
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </button>
        </form>

        <p class="card-footer">
            Having trouble? <a href="mailto:admin@schoollms.com">Contact Admin</a>
        </p>

    </div>
    <p class="ssl-badge">🔒 Secured with 256-bit SSL encryption</p>
</div>

<script>
    function togglePassword() {
        const input = document.getElementById('passwordInput');
        const icon = document.getElementById('eyeIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22"/>`;
        } else {
            input.type = 'password';
            icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
        }
    }

    (function() {
        for (let i = 0; i < 15; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 5 + 2;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (8 + Math.random() * 10) + 's';
            p.style.animationDelay = (Math.random() * 10) + 's';
            document.body.appendChild(p);
        }
    })();
</script>

</body>
</html>
