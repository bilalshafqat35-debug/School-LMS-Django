<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Assignment - School LMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .navbar { background: linear-gradient(135deg, #064e3b, #047857) !important; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .card-header { border-radius: 12px 12px 0 0 !important; }
        .form-label { font-weight: 500; font-size: 0.9rem; }
        .form-control:focus, .form-select:focus {
            border-color: #047857;
            box-shadow: 0 0 0 0.2rem rgba(4,120,87,0.15);
        }
        .btn-primary {
            background: linear-gradient(135deg, #064e3b, #047857);
            border: none;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #043927, #036644);
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand fw-bold">🏫 School LMS — Teacher</span>
    <a href="{% url 'core:teacher_dashboard' %}" class="btn btn-outline-light btn-sm">
        <i class="bi bi-arrow-left"></i> Back to Dashboard
    </a>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card">
                <div class="card-header text-white py-3"
                     style="background: linear-gradient(135deg, #064e3b, #047857);">
                    <h5 class="mb-0"><i class="bi bi-journal-plus"></i> Add New Assignment</h5>
                </div>
                <div class="card-body p-4">

                    {% if messages %}
                    <div class="mb-3">
                        {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        {% endfor %}
                    </div>
                    {% endif %}

                    <form method="POST" action="{% url 'core:add_assignment' %}">
                        {% csrf_token %}

                        <!-- Title -->
                        <div class="mb-3">
                            <label class="form-label">Assignment Title <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-pencil"></i></span>
                                <input type="text" name="title" class="form-control"
                                       placeholder="e.g. Chapter 3 Exercise"
                                       value="{{ request.POST.title }}"
                                       required>
                            </div>
                        </div>

                        <!-- Subject -->
                        <div class="mb-3">
                            <label class="form-label">Subject <span class="text-danger">*</span></label>
                            <select name="subject" class="form-select" required>
                                <option value="">-- Subject Select Karein --</option>
                                {% for subject in subjects %}
                                <option value="{{ subject.id }}"
                                    {% if request.POST.subject == subject.id|stringformat:"s" %}selected{% endif %}>
                                    {{ subject.name }} — {{ subject.student_class }}
                                </option>
                                {% empty %}
                                <option disabled>Koi subject assigned nahi</option>
                                {% endfor %}
                            </select>
                            {% if not subjects %}
                            <small class="text-warning">
                                <i class="bi bi-exclamation-triangle"></i>
                                Aapko koi subject assign nahi hua. Admin se contact karein.
                            </small>
                            {% endif %}
                        </div>

                        <!-- Due Date -->
                        <div class="mb-3">
                            <label class="form-label">Due Date <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-calendar3"></i></span>
                                <input type="date" name="due_date" class="form-control"
                                       value="{{ request.POST.due_date }}"
                                       required>
                            </div>
                        </div>

                        <!-- Description -->
                        <div class="mb-4">
                            <label class="form-label">
                                Description
                                <small class="text-muted fw-normal">(Optional)</small>
                            </label>
                            <textarea name="description" class="form-control" rows="4"
                                      placeholder="Assignment ki details likhein...">{{ request.POST.description }}</textarea>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary py-2">
                                <i class="bi bi-plus-circle"></i> Add Assignment
                            </button>
                            <a href="{% url 'core:teacher_dashboard' %}" class="btn btn-outline-secondary">
                                Cancel
                            </a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
