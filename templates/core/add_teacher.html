<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Teacher - School LMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .navbar { background: linear-gradient(135deg, #1e1b4b, #4c1d95) !important; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .card-header { border-radius: 12px 12px 0 0 !important; }
        .form-label { font-weight: 500; font-size: 0.9rem; }
        .form-control:focus { border-color: #4c1d95; box-shadow: 0 0 0 0.2rem rgba(76,29,149,0.15); }
        .btn-primary { background: linear-gradient(135deg, #4c1d95, #6d28d9); border: none; }
        .btn-primary:hover { background: linear-gradient(135deg, #3b1678, #5b21b6); }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand fw-bold">🏫 School LMS — Admin</span>
    <a href="{% url 'core:manage_teachers' %}" class="btn btn-outline-light btn-sm"> <!-- ✅ Fixed -->
        <i class="bi bi-arrow-left"></i> Back
    </a>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card">
                <div class="card-header text-white py-3"
                     style="background: linear-gradient(135deg, #4c1d95, #6d28d9);">
                    <h5 class="mb-0"><i class="bi bi-person-plus-fill"></i> Add New Teacher</h5>
                </div>
                <div class="card-body p-4">

                    <!-- ✅ Fixed - sab message types -->
                    {% if messages %}
                    <div class="mb-3">
                        {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        {% endfor %}
                    </div>
                    {% endif %}

                    <!-- ✅ Fixed - action URL add kiya -->
                    <form method="POST" action="{% url 'core:add_teacher' %}">
                        {% csrf_token %}

                        <div class="row">
                            <!-- ✅ Added first_name -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">First Name</label>
                                <input type="text" name="first_name" class="form-control"
                                       placeholder="e.g. Ahmad"
                                       value="{{ request.POST.first_name }}">
                            </div>
                            <!-- ✅ Added last_name -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Last Name</label>
                                <input type="text" name="last_name" class="form-control"
                                       placeholder="e.g. Khan"
                                       value="{{ request.POST.last_name }}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Username <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" name="username" class="form-control"
                                       placeholder="e.g. teacher_ahmad"
                                       value="{{ request.POST.username }}"
                                       required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" name="email" class="form-control"
                                       placeholder="e.g. teacher@school.com"
                                       value="{{ request.POST.email }}"
                                       required>
                            </div>
                        </div>

                        <!-- ✅ Added phone -->
                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                <input type="text" name="phone" class="form-control"
                                       placeholder="e.g. 03001234567"
                                       value="{{ request.POST.phone }}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" name="password" id="password"
                                       class="form-control"
                                       placeholder="Min 8 characters"
                                       required>
                                <button type="button" class="btn btn-outline-secondary"
                                        onclick="togglePass('password', this)">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>

                        <!-- ✅ Added confirm password -->
                        <div class="mb-4">
                            <label class="form-label">Confirm Password <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                <input type="password" name="confirm_password" id="confirm_password"
                                       class="form-control"
                                       placeholder="Dobara password likhein"
                                       required>
                                <button type="button" class="btn btn-outline-secondary"
                                        onclick="togglePass('confirm_password', this)">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                            <div id="passError" class="text-danger small mt-1" style="display:none;">
                                Passwords match nahi karte!
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary py-2" id="submitBtn">
                                <i class="bi bi-person-plus-fill"></i> Add Teacher
                            </button>
                            <a href="{% url 'core:manage_teachers' %}" class="btn btn-outline-secondary">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Password show/hide toggle
    function togglePass(id, btn) {
        const input = document.getElementById(id);
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }

    // ✅ Password match validation
    document.getElementById('submitBtn').addEventListener('click', function(e) {
        const pass = document.getElementById('password').value;
        const confirm = document.getElementById('confirm_password').value;
        const errDiv = document.getElementById('passError');

        if (pass !== confirm) {
            e.preventDefault();
            errDiv.style.display = 'block';
        } else {
            errDiv.style.display = 'none';
        }
    });
</script>

</body>
</html>
