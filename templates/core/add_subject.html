<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Subject - School LMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .navbar { background: linear-gradient(135deg, #1e1b4b, #4c1d95) !important; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .card-header { border-radius: 12px 12px 0 0 !important; }
        .form-label { font-weight: 500; font-size: 0.9rem; }
        .form-control:focus, .form-select:focus {
            border-color: #4c1d95;
            box-shadow: 0 0 0 0.2rem rgba(76,29,149,0.15);
        }
        .btn-primary { background: linear-gradient(135deg, #4c1d95, #6d28d9); border: none; }
        .btn-primary:hover { background: linear-gradient(135deg, #3b1678, #5b21b6); }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand fw-bold">🏫 School LMS — Admin</span>
    <a href="{% url 'core:manage_subjects' %}" class="btn btn-outline-light btn-sm"> <!-- ✅ Fixed -->
        <i class="bi bi-arrow-left"></i> Back
    </a>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card">
                <div class="card-header text-white py-3"
                     style="background: linear-gradient(135deg, #4c1d95, #6d28d9);">
                    <h5 class="mb-0"><i class="bi bi-plus-circle"></i> Add New Subject</h5>
                </div>
                <div class="card-body p-4">

                    <!-- ✅ Fixed messages -->
                    {% if messages %}
                    <div class="mb-3">
                        {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        {% endfor %}
                    </div>
                    {% endif %}

                    <!-- ✅ Fixed action -->
                    <form method="POST" action="{% url 'core:add_subject' %}">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Subject Name <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-book"></i></span>
                                <input type="text" name="name" class="form-control"
                                       placeholder="e.g. Mathematics"
                                       value="{{ request.POST.name }}" <!-- ✅ Value preserve -->
                                       required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Class <span class="text-danger">*</span></label>
                            <select name="student_class" class="form-select" required>
                                <option value="">-- Class Select Karein --</option>
                                {% for class in classes %}
                                <option value="{{ class.id }}"
                                    {% if request.POST.student_class == class.id|stringformat:"s" %}selected{% endif %}> <!-- ✅ Value preserve -->
                                    {{ class }}
                                </option>
                                {% empty %}
                                <option disabled>Koi class nahi abhi tak</option>
                                {% endfor %}
                            </select>
                            {% if not classes %}
                            <small class="text-danger">
                                <i class="bi bi-exclamation-triangle"></i>
                                Pehle <a href="/admin/core/class/add/" target="_blank">class add karein</a>.
                            </small>
                            {% endif %}
                        </div>

                        <div class="mb-4">
                            <label class="form-label">
                                Teacher
                                <small class="text-muted fw-normal">(Optional)</small>
                            </label>
                            <select name="teacher" class="form-select">
                                <option value="">-- Teacher Select Karein --</option>
                                {% for teacher in teachers %}
                                <option value="{{ teacher.id }}"
                                    {% if request.POST.teacher == teacher.id|stringformat:"s" %}selected{% endif %}> <!-- ✅ Value preserve -->
                                    {{ teacher.get_full_name|default:teacher.username }} <!-- ✅ Full name -->
                                    {% if teacher.email %}({{ teacher.email }}){% endif %}
                                </option>
                                {% empty %}
                                <option disabled>Koi teacher nahi abhi tak</option>
                                {% endfor %}
                            </select>
                            {% if not teachers %}
                            <small class="text-warning">
                                <i class="bi bi-exclamation-triangle"></i>
                                Koi teacher nahi. Pehle teacher add karein.
                            </small>
                            {% endif %}
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary py-2">
                                <i class="bi bi-plus-circle"></i> Add Subject
                            </button>
                            <a href="{% url 'core:manage_subjects' %}" class="btn btn-outline-secondary">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
