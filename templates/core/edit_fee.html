<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Fee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">🏫 School LMS — Fee Manager</span>
    <a href="{% url 'core:manage_fees' %}" class="btn btn-outline-light btn-sm">← Back</a>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark">
                    <h5>💰 Edit Fee Record</h5>
                </div>
                <div class="card-body">

                    {% if messages %}
                        {% for msg in messages %}
                            <div class="alert alert-{{ msg.tags }} alert-dismissible fade show">
                                {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <div class="alert alert-info">
                        <strong>Student:</strong> {{ fee.student.name }}
                        <span class="text-muted">({{ fee.student.student_class }})</span><br>
                        <strong>Month:</strong> {{ fee.get_month_display }} {{ fee.year }}
                    </div>

                    <form method="POST" action="{% url 'core:edit_fee' fee.id %}">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Amount (Rs.)</label>
                            <input type="number" name="amount" class="form-control"
                                   value="{{ fee.amount }}" min="1" step="0.01" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Status</label>
                            <select name="status" class="form-select" id="statusSelect">
                                <option value="unpaid"  {% if fee.status == 'unpaid'  %}selected{% endif %}>❌ Unpaid</option>
                                <option value="paid"    {% if fee.status == 'paid'    %}selected{% endif %}>✅ Paid</option>
                                <option value="partial" {% if fee.status == 'partial' %}selected{% endif %}>⚠️ Partial</option>
                            </select>
                        </div>

                        <div class="mb-3" id="datePaidWrapper"
                             style="{% if fee.status == 'unpaid' %}display:none{% endif %}">
                            <label class="form-label fw-semibold">Date Paid</label>
                            <input type="date" name="date_paid" class="form-control"
                                   value="{{ fee.date_paid|default:'' }}">
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-warning">💾 Update Fee</button>
                            <a href="{% url 'core:manage_fees' %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const statusSelect = document.getElementById('statusSelect');
    const datePaidWrapper = document.getElementById('datePaidWrapper');
    statusSelect.addEventListener('change', function () {
        datePaidWrapper.style.display = (this.value === 'paid' || this.value === 'partial') ? 'block' : 'none';
    });
</script>
</body>
</html>
