<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Subject</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">🏫 School LMS — Admin</span>
    <a href="{% url 'core:manage_subjects' %}" class="btn btn-outline-light btn-sm">← Back</a>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h5>📚 Edit Subject</h5>
                </div>
                <div class="card-body">

                    {% if messages %}
                        {% for msg in messages %}
                            <div class="alert alert-{{ msg.tags }} alert-dismissible fade show">
                                {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST" action="{% url 'core:edit_subject' subject.id %}">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Subject Name</label>
                            <input type="text" name="name" class="form-control"
                                   value="{{ subject.name }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Class</label>
                            <select name="student_class" class="form-select" required>
                                {% for class in classes %}
                                    <option value="{{ class.id }}"
                                        {% if class.id == subject.student_class.id %}selected{% endif %}>
                                        {{ class }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Teacher (Optional)</label>
                            <select name="teacher" class="form-select">
                                <option value="">-- No Teacher --</option>
                                {% for teacher in teachers %}
                                    <option value="{{ teacher.id }}"
                                        {% if subject.teacher and teacher.id == subject.teacher.id %}selected{% endif %}>
                                        {{ teacher.get_full_name|default:teacher.username }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">💾 Update Subject</button>
                            <a href="{% url 'core:manage_subjects' %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
