<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Fee - School LMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .navbar { background: linear-gradient(135deg, #1e1b4b, #4c1d95) !important; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .card-header { border-radius: 12px 12px 0 0 !important; }
        .form-label { font-weight: 500; font-size: 0.9rem; }
        .form-control:focus, .form-select:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 0.2rem rgba(16,185,129,0.15);
        }
        .btn-teal { background: linear-gradient(135deg, #10b981, #065f46); border: none; color: #fff; }
        .btn-teal:hover { background: linear-gradient(135deg, #059669, #064e3b); color: #fff; }
        #datePaidGroup { display: none; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand fw-bold">🏫 School LMS — Fee Manager</span>
    <a href="{% url 'core:manage_fees' %}" class="btn btn-outline-light btn-sm">
        <i class="bi bi-arrow-left"></i> Back
    </a>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card">
                <div class="card-header text-white py-3"
                     style="background: linear-gradient(135deg, #10b981, #065f46);">
                    <h5 class="mb-0"><i class="bi bi-cash-stack"></i> Add Fee Record</h5>
                </div>
                <div class="card-body p-4">

                    {% if messages %}
                    <div class="mb-3">
                        {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        {% endfor %}
                    </div>
                    {% endif %}

                    <form method="POST" action="{% url 'core:add_fee' %}">
                        {% csrf_token %}

                        <!-- Student -->
                        <div class="mb-3">
                            <label class="form-label">Student <span class="text-danger">*</span></label>
                            <select name="student" class="form-select" required>
                                <option value="">-- Student Select Karein --</option>
                                {% for student in students %}
                                <option value="{{ student.id }}"
                                    {% if request.POST.student == student.id|stringformat:"s" %}selected{% endif %}>
                                    {{ student.name }} — {{ student.student_class }}
                                </option>
                                {% empty %}
                                <option disabled>Koi student nahi abhi tak</option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Amount - FIXED: No Rs. prefix -->
                        <div class="mb-3">
                            <label class="form-label">Amount (Rs.) <span class="text-danger">*</span></label>
                            <input type="number" name="amount" class="form-control"
                                   placeholder="e.g. 3500"
                                   step="0.01" min="1" required>
                            <small class="text-muted">Sirf numbers likhein (jaise: 3500 ya 3499.99)</small>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Month <span class="text-danger">*</span></label>
                                <select name="month" class="form-select" required>
                                    <option value="">-- Month --</option>
                                    <option value="1">January</option>
                                    <option value="2">February</option>
                                    <option value="3">March</option>
                                    <option value="4">April</option>
                                    <option value="5" selected>May</option>
                                    <option value="6">June</option>
                                    <option value="7">July</option>
                                    <option value="8">August</option>
                                    <option value="9">September</option>
                                    <option value="10">October</option>
                                    <option value="11">November</option>
                                    <option value="12">December</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Year <span class="text-danger">*</span></label>
                                <input type="number" name="year" class="form-control"
                                       value="2026" min="2020" max="2099" required>
                            </div>
                        </div>

                        <!-- Status -->
                        <div class="mb-3">
                            <label class="form-label">Status <span class="text-danger">*</span></label>
                            <select name="status" class="form-select" id="statusSelect"
                                    onchange="toggleDatePaid(this.value)" required>
                                <option value="unpaid">❌ Unpaid</option>
                                <option value="paid" selected>✅ Paid</option>
                                <option value="partial">🔶 Partial</option>
                            </select>
                        </div>

                        <div class="mb-4" id="datePaidGroup">
                            <label class="form-label">Date Paid</label>
                            <input type="date" name="date_paid" class="form-control"
                                   value="2026-05-02">
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-teal py-2">
                                <i class="bi bi-cash-stack"></i> Add Fee Record
                            </button>
                            <a href="{% url 'core:manage_fees' %}" class="btn btn-outline-secondary">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleDatePaid(status) {
        const group = document.getElementById('datePaidGroup');
        if (status === 'paid' || status === 'partial') {
            group.style.display = 'block';
        } else {
            group.style.display = 'none';
        }
    }
    window.onload = function() {
        const status = document.getElementById('statusSelect').value;
        toggleDatePaid(status);
    };
</script>

</body>
</html>
