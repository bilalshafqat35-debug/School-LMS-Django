<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Announcement - School LMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .navbar { background: linear-gradient(135deg, #1e1b4b, #4c1d95) !important; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .card-header { border-radius: 12px 12px 0 0 !important; }
        .form-label { font-weight: 500; font-size: 0.9rem; }
        .form-control:focus, .form-select:focus {
            border-color: #4c1d95;
            box-shadow: 0 0 0 0.2rem rgba(76,29,149,0.15);
        }
        .btn-primary { background: linear-gradient(135deg, #4c1d95, #6d28d9); border: none; }
        .btn-primary:hover { background: linear-gradient(135deg, #3b1678, #5b21b6); }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand fw-bold">🏫 School LMS — Admin</span>
    <a href="{% url 'core:admin_dashboard' %}" class="btn btn-outline-light btn-sm">
        <i class="bi bi-arrow-left"></i> Back
    </a>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card">
                <div class="card-header text-white py-3"
                     style="background: linear-gradient(135deg, #4c1d95, #6d28d9);">
                    <h5 class="mb-0"><i class="bi bi-megaphone-fill"></i> Add New Announcement</h5>
                </div>
                <div class="card-body p-4">

                    {% if messages %}
                    <div class="mb-3">
                        {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        {% endfor %}
                    </div>
                    {% endif %}

                    <form method="POST" action="{% url 'core:add_announcement' %}">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Title <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-megaphone"></i></span>
                                <input type="text" name="title" class="form-control"
                                       placeholder="e.g. School Holiday Notice"
                                       value="{{ request.POST.title }}"
                                       required>
                            </div>
                        </div>

                        <!-- ✅ message field - model ke mutabiq -->
                        <div class="mb-3">
                            <label class="form-label">Message <span class="text-danger">*</span></label>
                            <textarea name="message" class="form-control" rows="5"
                                      placeholder="Announcement ki details likhein..."
                                      required>{{ request.POST.message }}</textarea>
                        </div>

                        <!-- ✅ Audience choices - model ke mutabiq -->
                        <div class="mb-4">
                            <label class="form-label">Audience <span class="text-danger">*</span></label>
                            <select name="audience" class="form-select" required>
                                <option value="all"
                                    {% if request.POST.audience == 'all' %}selected{% endif %}>
                                    👥 All — Teachers & Parents
                                </option>
                                <option value="parents"
                                    {% if request.POST.audience == 'parents' %}selected{% endif %}>
                                    👨‍👩‍👧 Parents Only
                                </option>
                                <option value="teachers"
                                    {% if request.POST.audience == 'teachers' %}selected{% endif %}>
                                    👨‍🏫 Teachers Only
                                </option>
                            </select>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary py-2">
                                <i class="bi bi-megaphone-fill"></i> Post Announcement
                            </button>
                            <a href="{% url 'core:admin_dashboard' %}" class="btn btn-outline-secondary">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
